<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Simon Says</h1>

    <h2>Press Start or Any Key</h2>

    <div class="score-box">
        <span>Level : <span id="level">0</span></span>
        <span>High Score : <span id="high">0</span></span>
    </div>

    <div class="game">

        <div class="btn red" id="red"></div>
        <div class="btn yellow" id="yellow"></div>

        <div class="start" id="start">
            START
        </div>

        <div class="btn green" id="green"></div>
        <div class="btn blue" id="blue"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
